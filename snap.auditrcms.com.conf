server {
    listen 80;
    listen [::]:80;
    server_name snap.auditrcms.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;

    # Root directory of the Laravel application
    root /var/www/snap1/public;
    index index.php index.html index.htm;

    charset utf-8;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # Log files
    error_log /var/log/nginx/snap.auditrcms.com_error.log error;
    access_log /var/log/nginx/snap.auditrcms.com_access.log;

    # Max upload size
    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # PHP-FPM execution
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Security: Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # Static file caching
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# SSL server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name snap.auditrcms.com;
    root /var/www/snap1/public;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/auditrcms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auditrcms.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    charset utf-8;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "upgrade-insecure-requests";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
